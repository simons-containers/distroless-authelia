name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Fetch latest versions
        uses: nick-fields/retry@v4
        with:
          max_attempts: 5
          timeout_minutes: 10
          command: |
            set -uo pipefail
            GOLANG=$(git ls-remote --tags https://go.googlesource.com/go.git/ \
              | awk -F/ '/go[0-9\.]+$/ {gsub("go", ""); print $3}' \
              | sort -V | tail -1)
            AUTHELIA=$(git ls-remote --tags https://github.com/authelia/authelia.git/  \
              | awk -F/ '/v[0-9\.]+$/ {print $3}' \
              | sort -V | tail -1)

            : ${GOLANG:?} ${AUTHELIA:?}

            jq \
              --arg golang "$GOLANG" \
              --arg authelia  "$AUTHELIA" \
              '
                .golang.version = $golang |
                .authelia.version  = $authelia
              ' sources.json > tmp.json && mv tmp.json sources.json

            git diff sources.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update authelia
          commit-message: Update authelia
