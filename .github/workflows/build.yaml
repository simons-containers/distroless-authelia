name: Build and publish distroless-authelia

on:
  push:
    branches: [ "main" ]
    paths:
      - Containerfile
      - versions.yaml
  pull_request:
    branches: [ "main" ]
    paths:
      - Containerfile
      - versions.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        run: |
          echo "AUTHELIA_VERSION=$(yq -r '.authelia' versions.yaml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg AUTHELIA_VERSION=${AUTHELIA_VERSION} \
            -t ghcr.io/simons-containers/distroless-authelia:${AUTHELIA_VERSION} \
            -t ghcr.io/simons-containers/distroless-authelia:latest \
            --push \
            -f Containerfile .